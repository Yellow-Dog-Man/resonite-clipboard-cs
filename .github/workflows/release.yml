name: "Release build"

on:
  release:
    types:
      - published

jobs:
  build-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - run: |
          dotnet build -c Release -p:Version=${{ github.event.release.tag_name }}
          dotnet pack -c Release -p:Version=${{ github.event.release.tag_name }}

      - run: |
          dotnet nuget push **/*.nupkg -k ${{ secrets.NUGET_TOKEN }} -s https://api.nuget.org/v3/index.json
